<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Checkerboard</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="cb-base">
  <div class="drift-x"><div class="drift-y">
    <div id="cb-tile"></div>
  </div></div>
</div>

<div id="glitch">
  <div class="drift-x"><div class="drift-y"><div id="glitch-slice" class="glitch-band"></div></div></div>
  <div class="drift-x"><div class="drift-y"><div id="glitch-slice2" class="glitch-band"></div></div></div>
  <div class="drift-x"><div class="drift-y"><div id="glitch-slice3" class="glitch-band"></div></div></div>
  <div class="drift-x"><div class="drift-y"><div id="glitch-slice4" class="glitch-band"></div></div></div>
  <div id="glitch-r"></div>
  <div id="glitch-g"></div>
  <div id="glitch-b"></div>
  <div id="glitch-scan"></div>
</div>

<script src="script.js"></script>
</body>
</html>
